<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZedPlay — Stream Everything</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23080010'/><text y='.9em' font-size='80' x='10'>▶</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   ZEDPLAY - DESIGN SYSTEM & CSS VARIABLES
   ============================================ */
:root {
  --bg-void: #030008;
  --bg-deep: #080010;
  --bg-surface: #0e001a;
  --bg-card: #120020;
  --bg-glass: rgba(18, 0, 32, 0.6);
  --bg-glass-light: rgba(255,255,255,0.04);

  --accent-primary: #a855f7;
  --accent-secondary: #7c3aed;
  --accent-glow: #c084fc;
  --accent-hot: #f0abfc;
  --accent-cyan: #22d3ee;
  --accent-rose: #fb7185;

  --text-primary: #f8f4ff;
  --text-secondary: #c4b5d8;
  --text-muted: #7c6b99;
  --text-dim: #4a3d5e;

  --border-subtle: rgba(168,85,247,0.15);
  --border-glow: rgba(168,85,247,0.4);

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  --shadow-card: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(168,85,247,0.08);
  --shadow-glow: 0 0 40px rgba(168,85,247,0.25);
  --shadow-hover: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(168,85,247,0.2);

  --nav-height: 70px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-void);
  color: var(--text-primary);
  overflow-x: hidden;
  min-height: 100vh;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
img { display: block; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--accent-secondary); border-radius: 2px; }

/* ============================================
   LOADING SCREEN
   ============================================ */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg-void);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}
#loading-screen.hidden { opacity: 0; visibility: hidden; }
.loading-logo {
  font-size: 3rem; font-weight: 900; letter-spacing: -2px;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan), var(--accent-rose));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: logoPulse 2s ease-in-out infinite;
}
@keyframes logoPulse {
  0%, 100% { filter: drop-shadow(0 0 20px rgba(168,85,247,0.5)); }
  50% { filter: drop-shadow(0 0 40px rgba(168,85,247,0.9)); }
}
.loading-bar-wrap {
  width: 200px; height: 2px;
  background: rgba(168,85,247,0.15);
  border-radius: 1px; overflow: hidden;
}
.loading-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary), var(--accent-cyan));
  border-radius: 1px;
  transition: width 0.3s ease;
  box-shadow: 0 0 10px var(--accent-primary);
}
.loading-text {
  font-size: 0.8rem; color: var(--text-muted);
  letter-spacing: 3px; text-transform: uppercase;
}

/* ============================================
   NAVIGATION
   ============================================ */
#navbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-height); z-index: 1000;
  display: flex; align-items: center;
  padding: 0 40px; gap: 32px;
  transition: background 0.4s ease, box-shadow 0.4s ease;
}
#navbar.scrolled {
  background: rgba(8,0,16,0.92);
  backdrop-filter: blur(20px);
  box-shadow: 0 1px 0 var(--border-subtle), 0 4px 20px rgba(0,0,0,0.5);
}
.nav-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(3,0,8,0.95) 0%, transparent 100%);
  pointer-events: none; z-index: -1;
}
.nav-logo {
  font-size: 1.75rem; font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-cyan) 60%, var(--accent-rose) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  flex-shrink: 0;
  cursor: pointer;
  filter: drop-shadow(0 0 12px rgba(168,85,247,0.4));
  transition: filter var(--transition);
}
.nav-logo:hover { filter: drop-shadow(0 0 20px rgba(168,85,247,0.7)); }
.nav-links {
  display: flex; align-items: center; gap: 8px;
  flex: 1;
}
.nav-btn {
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-size: 0.875rem; font-weight: 500;
  color: var(--text-secondary);
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
  position: relative;
}
.nav-btn:hover, .nav-btn.active {
  color: var(--text-primary);
  background: var(--bg-glass-light);
}
.nav-btn.active::after {
  content: '';
  position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 2px;
  background: var(--accent-primary);
  border-radius: 1px;
}
.nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

/* Genres Dropdown */
.nav-dropdown { position: relative; }
.nav-dropdown-menu {
  position: absolute; top: calc(100% + 12px); left: 0;
  min-width: 200px;
  background: rgba(14,0,26,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 8px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateY(-8px);
  transition: all 0.2s ease;
  box-shadow: var(--shadow-card);
  display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
}
.nav-dropdown:hover .nav-dropdown-menu,
.nav-dropdown-menu:hover {
  opacity: 1; visibility: visible; pointer-events: all;
  transform: translateY(0);
}
.genre-item {
  padding: 8px 12px; border-radius: var(--radius-sm);
  font-size: 0.8rem; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition);
  white-space: nowrap;
}
.genre-item:hover {
  background: rgba(168,85,247,0.15);
  color: var(--accent-glow);
}
.nav-right {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
}
.search-btn-nav {
  width: 38px; height: 38px;
  background: var(--bg-glass-light);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  transition: all var(--transition);
}
.search-btn-nav:hover {
  background: rgba(168,85,247,0.15);
  border-color: var(--border-glow);
  color: var(--accent-glow);
}
.search-btn-nav svg { width: 18px; height: 18px; }

/* ============================================
   PAGES (HOME / SEARCH / PLAYER)
   ============================================ */
.page { display: none; }
.page.active { display: block; }

/* ============================================
   HERO SECTION
   ============================================ */
#hero {
  position: relative; height: 90vh; min-height: 600px;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center top;
  transition: opacity 1s ease;
}
.hero-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    90deg,
    rgba(3,0,8,0.95) 0%,
    rgba(3,0,8,0.7) 40%,
    rgba(3,0,8,0.1) 70%,
    transparent 100%
  ),
  linear-gradient(
    0deg,
    rgba(3,0,8,1) 0%,
    rgba(3,0,8,0.4) 40%,
    transparent 70%
  );
}
.hero-content {
  position: relative; z-index: 2;
  padding: calc(var(--nav-height) + 80px) 60px 60px;
  max-width: 600px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  background: rgba(168,85,247,0.15);
  border: 1px solid rgba(168,85,247,0.3);
  font-size: 0.72rem; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent-glow);
  margin-bottom: 16px;
}
.hero-badge svg { width: 12px; height: 12px; }
.hero-title {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900; line-height: 1.05; letter-spacing: -1px;
  margin-bottom: 16px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
.hero-meta {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.hero-meta-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.85rem; color: var(--text-secondary);
}
.hero-meta-item svg { width: 14px; height: 14px; color: var(--accent-primary); }
.hero-rating {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.875rem; font-weight: 700; color: #fbbf24;
}
.hero-rating svg { width: 14px; height: 14px; }
.hero-desc {
  font-size: 0.95rem; line-height: 1.7;
  color: var(--text-secondary);
  margin-bottom: 28px;
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.hero-genres {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
}
.hero-genre-tag {
  padding: 4px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 0.75rem; color: var(--text-secondary);
}
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 28px; border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
  color: white; font-size: 0.925rem; font-weight: 700;
  transition: all var(--transition);
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124,58,237,0.6);
}
.btn-primary svg { width: 18px; height: 18px; }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 24px; border-radius: var(--radius-md);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  color: white; font-size: 0.925rem; font-weight: 600;
  transition: all var(--transition);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  transform: translateY(-2px);
}
.btn-secondary svg { width: 18px; height: 18px; }

/* Hero indicators */
.hero-indicators {
  position: absolute; bottom: 40px; right: 60px;
  display: flex; gap: 8px; z-index: 2;
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.3);
  cursor: pointer; transition: all var(--transition);
}
.hero-dot.active {
  width: 24px; background: var(--accent-primary);
}

/* ============================================
   CONTENT SECTIONS
   ============================================ */
#main-content { padding-bottom: 60px; }

.section {
  padding: 40px 0 20px;
}
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; margin-bottom: 20px;
}
.section-title {
  font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::before {
  content: '';
  width: 3px; height: 20px;
  background: linear-gradient(180deg, var(--accent-primary), var(--accent-cyan));
  border-radius: 2px;
  flex-shrink: 0;
}
.section-link {
  font-size: 0.8rem; font-weight: 600; color: var(--accent-primary);
  letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; gap: 4px;
  transition: gap var(--transition);
}
.section-link:hover { gap: 8px; }
.section-link svg { width: 14px; height: 14px; }

/* Horizontal Scroll Row */
.scroll-row-wrap {
  position: relative;
}
.scroll-row {
  display: flex; gap: 12px;
  padding: 8px 40px 16px;
  overflow-x: auto; overflow-y: visible;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.scroll-row::-webkit-scrollbar { height: 0; }
.scroll-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(18,0,32,0.9);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-subtle);
  color: white; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all var(--transition);
  box-shadow: var(--shadow-card);
}
.scroll-arrow svg { width: 20px; height: 20px; }
.scroll-arrow.left { left: 8px; }
.scroll-arrow.right { right: 8px; }
.scroll-row-wrap:hover .scroll-arrow { opacity: 1; }
.scroll-arrow:hover {
  background: var(--accent-secondary);
  border-color: var(--accent-primary);
  box-shadow: var(--shadow-glow);
}

/* ============================================
   MOVIE CARDS
   ============================================ */
.card {
  flex-shrink: 0;
  width: 180px;
  border-radius: var(--radius-md);
  overflow: visible;
  cursor: pointer;
  scroll-snap-align: start;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), z-index 0s;
  position: relative;
  z-index: 1;
}
.card:hover { transform: scale(1.08) translateY(-8px); z-index: 10; }
.card-poster {
  width: 100%; aspect-ratio: 2/3;
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--bg-card);
  position: relative;
  box-shadow: var(--shadow-card);
  transition: box-shadow 0.35s ease;
}
.card:hover .card-poster {
  box-shadow: var(--shadow-hover);
}
.card-img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
  background: var(--bg-card);
}
.card:hover .card-img { transform: scale(1.05); }
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(3,0,8,0.95) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.35s ease;
  display: flex; flex-direction: column;
  justify-content: flex-end; padding: 12px;
  border-radius: var(--radius-md);
}
.card:hover .card-overlay { opacity: 1; }
.card-play-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent-primary);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 8px;
  box-shadow: 0 0 20px rgba(168,85,247,0.5);
  transition: transform var(--transition);
}
.card-play-btn:hover { transform: scale(1.1); }
.card-play-btn svg { width: 18px; height: 18px; color: white; margin-left: 2px; }
.card-overlay-title {
  font-size: 0.75rem; font-weight: 700; line-height: 1.3;
  margin-bottom: 4px;
}
.card-overlay-rating {
  display: flex; align-items: center; gap: 3px;
  font-size: 0.7rem; color: #fbbf24; font-weight: 600;
}
.card-overlay-rating svg { width: 11px; height: 11px; }
.card-rating-badge {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(251,191,36,0.3);
  border-radius: var(--radius-sm);
  padding: 3px 6px;
  display: flex; align-items: center; gap: 3px;
  font-size: 0.7rem; font-weight: 700; color: #fbbf24;
}
.card-rating-badge svg { width: 10px; height: 10px; }
.card-type-badge {
  position: absolute; top: 8px; left: 8px;
  padding: 2px 7px; border-radius: 4px;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.card-type-badge.movie { background: rgba(124,58,237,0.8); color: white; }
.card-type-badge.tv { background: rgba(34,211,238,0.8); color: var(--bg-void); }
.card-info {
  padding: 8px 4px 0;
}
.card-title {
  font-size: 0.8rem; font-weight: 600; line-height: 1.3;
  color: var(--text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color var(--transition);
}
.card:hover .card-title { color: var(--text-primary); }
.card-year {
  font-size: 0.7rem; color: var(--text-muted); margin-top: 2px;
}

/* Skeleton Loader */
.card-skeleton {
  flex-shrink: 0; width: 180px;
}
.skeleton-poster {
  width: 100%; aspect-ratio: 2/3;
  border-radius: var(--radius-md);
  background: linear-gradient(90deg, var(--bg-card) 25%, rgba(168,85,247,0.08) 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.skeleton-title {
  height: 12px; border-radius: 6px; margin-top: 8px;
  background: linear-gradient(90deg, var(--bg-card) 25%, rgba(168,85,247,0.08) 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite 0.1s;
}
.skeleton-year {
  height: 10px; width: 60%; border-radius: 5px; margin-top: 5px;
  background: linear-gradient(90deg, var(--bg-card) 25%, rgba(168,85,247,0.08) 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite 0.2s;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ============================================
   SEARCH PAGE
   ============================================ */
#search-page {
  min-height: 100vh;
  padding: calc(var(--nav-height) + 30px) 40px 60px;
}
.search-hero {
  padding: 20px 0 40px;
  text-align: center;
}
.search-hero-title {
  font-size: 2rem; font-weight: 800; letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.search-hero-title span {
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.search-input-wrap {
  position: relative; max-width: 620px; margin: 24px auto 0;
}
.search-input-wrap svg {
  position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; color: var(--text-muted); pointer-events: none;
}
#search-input {
  width: 100%; padding: 16px 56px 16px 52px;
  background: rgba(18,0,32,0.8);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  color: var(--text-primary); font-family: inherit; font-size: 1rem;
  transition: all var(--transition);
  outline: none;
}
#search-input:focus {
  border-color: var(--border-glow);
  box-shadow: 0 0 0 3px rgba(168,85,247,0.1), var(--shadow-glow);
}
#search-input::placeholder { color: var(--text-dim); }
.search-clear-btn {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(168,85,247,0.2);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  opacity: 0; transition: all var(--transition); pointer-events: none;
}
#search-input:not(:placeholder-shown) + .search-clear-btn {
  opacity: 1; pointer-events: all;
}
.search-clear-btn svg { width: 14px; height: 14px; }
.search-filter-tabs {
  display: flex; gap: 8px; justify-content: center;
  margin-top: 16px; flex-wrap: wrap;
}
.filter-tab {
  padding: 7px 18px; border-radius: 20px;
  font-size: 0.8rem; font-weight: 600;
  background: var(--bg-glass-light);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  transition: all var(--transition);
}
.filter-tab.active, .filter-tab:hover {
  background: rgba(168,85,247,0.2);
  border-color: var(--border-glow);
  color: var(--accent-glow);
}
.search-results-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.search-results-count {
  font-size: 0.875rem; color: var(--text-muted);
}
.search-results-count span { color: var(--accent-primary); font-weight: 700; }
.search-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}
.search-grid .card { width: 100%; }
#search-loading, #search-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px; gap: 16px;
  color: var(--text-muted);
}
#search-empty svg { width: 48px; height: 48px; opacity: 0.3; }
#search-empty p { font-size: 1rem; }
#search-empty small { font-size: 0.8rem; color: var(--text-dim); }
.spinner {
  width: 40px; height: 40px;
  border: 2px solid rgba(168,85,247,0.15);
  border-top-color: var(--accent-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================
   PLAYER PAGE
   ============================================ */
#player-page {
  min-height: 100vh;
  background: var(--bg-void);
}
.player-back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 100;
  display: flex; align-items: center; gap: 8px;
  padding: 9px 18px; border-radius: var(--radius-md);
  background: rgba(18,0,32,0.9);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary); font-size: 0.875rem; font-weight: 600;
  transition: all var(--transition);
}
.player-back-btn:hover {
  color: var(--text-primary);
  border-color: var(--border-glow);
}
.player-back-btn svg { width: 16px; height: 16px; }
.player-wrap {
  padding-top: 64px;
}
.player-iframe-container {
  width: 100%; aspect-ratio: 16/9;
  background: #000; position: relative;
  border-bottom: 1px solid var(--border-subtle);
}
.player-iframe-container iframe {
  width: 100%; height: 100%; border: none;
}
.player-loading-overlay {
  position: absolute; inset: 0;
  background: var(--bg-void);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.4s ease;
}
.player-loading-overlay.hidden { opacity: 0; pointer-events: none; }
.player-loading-logo {
  font-size: 2rem; font-weight: 900;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: logoPulse 1.5s ease-in-out infinite;
}
.player-controls {
  padding: 20px 40px;
  background: var(--bg-deep);
}
.player-server-label {
  font-size: 0.72rem; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 10px;
}
.server-btns {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.server-btn {
  padding: 8px 18px; border-radius: var(--radius-sm);
  font-size: 0.8rem; font-weight: 600;
  background: var(--bg-glass-light);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  transition: all var(--transition);
}
.server-btn.active {
  background: rgba(168,85,247,0.2);
  border-color: var(--accent-primary);
  color: var(--accent-glow);
}
.server-btn:hover:not(.active) {
  background: rgba(168,85,247,0.1);
  border-color: rgba(168,85,247,0.3);
  color: var(--text-primary);
}
.player-info {
  display: flex; gap: 24px; align-items: flex-start;
}
.player-poster {
  width: 100px; border-radius: var(--radius-md);
  overflow: hidden; flex-shrink: 0;
  box-shadow: var(--shadow-card);
}
.player-poster img { width: 100%; display: block; }
.player-meta h2 {
  font-size: 1.5rem; font-weight: 800; letter-spacing: -0.3px;
  margin-bottom: 8px;
}
.player-meta-row {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 10px; flex-wrap: wrap;
}
.player-meta-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.8rem; color: var(--text-secondary);
}
.player-meta-item svg { width: 14px; height: 14px; color: var(--accent-primary); }
.player-rating {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.875rem; font-weight: 700; color: #fbbf24;
}
.player-rating svg { width: 14px; height: 14px; }
.player-overview {
  font-size: 0.875rem; line-height: 1.7; color: var(--text-secondary);
  display: -webkit-box; -webkit-line-clamp: 4;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* TV Season/Episode Controls */
.tv-controls {
  padding: 20px 40px;
  border-top: 1px solid var(--border-subtle);
}
.tv-controls-header {
  display: flex; gap: 16px; margin-bottom: 16px;
  flex-wrap: wrap;
}
.season-select, .episode-select {
  padding: 9px 14px; border-radius: var(--radius-sm);
  background: var(--bg-glass-light);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary); font-family: inherit;
  font-size: 0.875rem; cursor: pointer; outline: none;
  transition: all var(--transition);
  min-width: 140px;
}
.season-select:focus, .episode-select:focus {
  border-color: var(--border-glow);
  box-shadow: 0 0 0 2px rgba(168,85,247,0.1);
}
.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px; max-height: 360px; overflow-y: auto;
  padding-right: 8px;
}
.episode-card {
  padding: 10px; border-radius: var(--radius-sm);
  background: var(--bg-glass-light);
  border: 1px solid var(--border-subtle);
  cursor: pointer; transition: all var(--transition);
  display: flex; gap: 10px; align-items: flex-start;
}
.episode-card:hover, .episode-card.active {
  background: rgba(168,85,247,0.12);
  border-color: rgba(168,85,247,0.3);
}
.episode-thumb {
  width: 80px; aspect-ratio: 16/9;
  border-radius: 6px; overflow: hidden;
  flex-shrink: 0; background: var(--bg-card);
}
.episode-thumb img { width: 100%; height: 100%; object-fit: cover; }
.episode-num {
  font-size: 0.65rem; font-weight: 700; color: var(--accent-primary);
  margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px;
}
.episode-name {
  font-size: 0.78rem; font-weight: 600; line-height: 1.3;
  color: var(--text-primary);
}
.episode-overview {
  font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; margin-top: 3px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* Trailer Modal */
#trailer-modal {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden; pointer-events: none;
  transition: all 0.3s ease;
}
#trailer-modal.open { opacity: 1; visibility: visible; pointer-events: all; }
.trailer-container {
  width: 90vw; max-width: 900px;
  aspect-ratio: 16/9;
  border-radius: var(--radius-lg);
  overflow: hidden; position: relative;
  box-shadow: 0 0 80px rgba(168,85,247,0.3);
}
.trailer-container iframe { width: 100%; height: 100%; border: none; }
.trailer-close {
  position: absolute; top: -44px; right: 0;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  color: white; transition: all var(--transition);
}
.trailer-close:hover { background: rgba(255,255,255,0.2); }
.trailer-close svg { width: 18px; height: 18px; }

/* ============================================
   GENRE FILTER PILLS (ON HOME PAGE)
   ============================================ */
.genre-filter-section {
  padding: 8px 40px 4px;
  display: flex; gap: 8px; overflow-x: auto;
}
.genre-filter-section::-webkit-scrollbar { height: 0; }
.genre-pill {
  flex-shrink: 0; padding: 7px 16px;
  border-radius: 20px; font-size: 0.78rem; font-weight: 600;
  background: var(--bg-glass-light);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary); cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.genre-pill.active, .genre-pill:hover {
  background: rgba(168,85,247,0.2);
  border-color: var(--accent-primary);
  color: var(--accent-glow);
}

/* ============================================
   TOAST NOTIFICATION
   ============================================ */
#toast {
  position: fixed; bottom: 30px; right: 30px; z-index: 5000;
  padding: 12px 20px; border-radius: var(--radius-md);
  background: rgba(14,0,26,0.95);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary); font-size: 0.875rem;
  box-shadow: var(--shadow-card);
  transform: translateY(20px); opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }

/* ============================================
   INFINITE SCROLL SENTINEL
   ============================================ */
.infinite-sentinel {
  height: 1px; margin-top: 20px;
}
.load-more-spinner {
  display: flex; justify-content: center; padding: 20px;
}

/* ============================================

@media (max-width: 768px) {

@media (max-width: 480px) {

}

</head>

// ── HELPERS ───────────────────────────────
function imgUrl(path, size='w342') {
  return path ? `${IMG_BASE}/${size}${path}` : PLACEHOLDER;
}
function imgUrlFull(path, size='w1280') {
  return path ? `${IMG_BASE}/${size}${path}` : '';
}
async function tmdb(path, params='') {
  const url = `${TMDB_BASE}${path}?api_key=${TMDB_KEY}${params}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`TMDB error ${res.status}`);
  return res.json();
}
function getMediaType(item) {
  return item.media_type || (item.title ? 'movie' : 'tv');
}
function getTitle(item) {
  return item.title || item.name || 'Untitled';
}
function getYear(item) {
  const d = item.release_date || item.first_air_date || '';
  return d ? d.slice(0,4) : '';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── PAGE NAVIGATION ───────────────────────
function showPage(name) {
  previousPage = currentPage;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(name + '-page').classList.add('active');
  currentPage = name;
  // Nav button states
  document.querySelectorAll('.nav-btn[id^="nav-"]').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  window.scrollTo(0,0);
  if (name === 'search') {
    setTimeout(() => document.getElementById('search-input').focus(), 100);
  }
}
function goBack() {
  showPage(previousPage === 'player' ? 'home' : previousPage);
}

// ── LOADING SCREEN ────────────────────────
function animateLoadingBar() {
  const bar = document.getElementById('loading-bar');
  let w = 0;
  const iv = setInterval(() => {
    w += Math.random() * 15;
    if (w > 90) w = 90;
    bar.style.width = w + '%';
  }, 200);
  return (done) => {
    clearInterval(iv);
    bar.style.width = '100%';
    setTimeout(done, 400);
  };
}

    sectionPages[sec.label] = { page:1, loading:false, done:false, genreId };

async function loadSectionPage(sec, genreId, replace=false) {
  const state = sectionPages[sec.label];
  if (state.loading || state.done) return;
  state.loading = true;

  const row = document.getElementById('row-' + sec.label);

  try {
    let extra = sec.extra || '';
    if (genreId && !extra) {
      extra = `&with_genres=${genreId}`;
    } else if (genreId && extra) {
      extra += `&with_genres=${genreId}`;
    }
    const data = await tmdb(sec.endpoint, `&page=${state.page}${extra}`);
    const items = data.results || [];

    if (replace) row.innerHTML = '';
    if (items.length === 0 || state.page >= (data.total_pages||1)) {
      state.done = true;
    }

    items.forEach(item => {
      row.appendChild(createCard(item, sec.endpoint.includes('/tv') ? 'tv' : null));
    });

    state.page++;
    state.loading = false;
  } catch(e) {
    console.error('Section load error', sec.label, e);
    state.loading = false;
  }
}

// Setup IntersectionObserver on last card of each row for infinite horizontal scroll
function setupRowInfiniteScroll(sec) {
  const row = document.getElementById('row-' + sec.label);
  row.addEventListener('scroll', () => {
    const { scrollLeft, scrollWidth, clientWidth } = row;
    // When within 300px of right edge, load more
    if (scrollWidth - scrollLeft - clientWidth < 300) {
      loadSectionPage(sec, sectionPages[sec.label].genreId);
    }
  });
}

function scrollRowBy(rowId, amount) {
  const row = document.getElementById(rowId);
  if (row) row.scrollBy({ left: amount, behavior: 'smooth' });
}

function scrollToSection(sectionId) {
  showPage('home');
  setTimeout(() => {
    const el = document.getElementById(sectionId);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 100);
}

// ── LAZY IMAGE LOADING ────────────────────
const imgObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const img = e.target;
      if (img.dataset.src) {
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
        imgObserver.unobserve(img);
      }
    }
  });
}, { rootMargin: '100px' });
function observeCardImage(img) { imgObserver.observe(img); }

// ── STREAMING ENGINE ──────────────────────
/*
  6 servers for maximum content coverage:
  ┌─ IMDb ID required ──────────────────────────────────────────────┐
  │  S1 Fikka      https://fikka407bis.com/play/{imdb_id}           │
  │  S2 Vembed     https://vembed.stream/play/{imdb_id}             │
  └─────────────────────────────────────────────────────────────────┘
  ┌─ TMDB ID (always available, no conversion needed) ──────────────┐
  │  S3 LetsEmbed  letsembed.cc/embed/movie|tv/?id={tmdb}           │
  │  S4 VidSrc     vidsrc.to/embed/movie|tv/{tmdb}                  │
  │  S5 SuperEmbed multiembed.mov/embed/movie|tv?tmdb={tmdb}        │
  │  S6 2Embed     2embed.cc/embed/movie|series/{tmdb}              │
  └─────────────────────────────────────────────────────────────────┘

  Auto-fallback: if IMDb ID missing, S1/S2 skip to S3.
  tryNextServer() cycles through all 6 in order.
*/

// ── OPEN PLAYER ───────────────────────────
// Fixed to match the exact working pattern from the reference file:
//   Step 1: set globals
//   Step 2: await convertToImdb()   ← FIRST, alone, blocking
//   Step 3: loadServer(1)           ← fires immediately after imdbId is ready
//   Step 4: load details in background (non-blocking, just for the info panel)
async function openPlayer(tmdbId, type, title) {

  currentMedia = { id: tmdbId, type, title, season: 1, episode: 1, imdb_id: null };
  currentServer = 1;

  showPage('player');
  document.getElementById('player-iframe').src = '';
  document.getElementById('player-loading').classList.remove('hidden');
  document.getElementById('tv-controls').style.display = 'none';
  setServerStatus('');

  document.querySelectorAll('.server-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
  });

  // Step 2 — convert TMDB ID to IMDb ID first (awaited alone, never races)
  const imdbId = await convertToImdb(type, tmdbId);
  currentMedia.imdb_id = imdbId;

  // Step 3 — fire the player immediately once imdbId is available
  loadServer(1);

  // Step 4 — load info panel in background, never blocks the player
  tmdb(`/${type}/${tmdbId}`)
    .then(details => {
      renderPlayerInfo(details, type);
      if (type === 'tv') loadTVControls(details);
    })
    .catch(e => console.warn('Info panel load failed (non-critical):', e));
}

// ── TMDB → IMDB CONVERSION ────────────────
// Direct port of the working reference file — fetch /external_ids, return imdb_id
async function convertToImdb(type, id) {
  try {
    const res = await fetch(
      `${TMDB_BASE}/${type}/${id}/external_ids?api_key=${TMDB_KEY}`
    );
    const data = await res.json();
    return data.imdb_id || null;
  } catch(e) {
    console.warn('IMDb conversion failed:', e);
    return null;
  }
}


// ── BUILD STREAM URL ──────────────────────
// Returns the URL for a given server number, or null if prerequisites missing
function buildStreamURL(server) {
  const { id, type, imdb_id, season, episode } = currentMedia;
  const isTV = type === 'tv';

  switch (server) {
    case 1: // Fikka — IMDb ID
      return imdb_id ? `https://fikka407bis.com/play/${imdb_id}` : null;

    case 2: // Vembed — IMDb ID
      return imdb_id ? `https://vembed.stream/play/${imdb_id}` : null;

    case 3: // LetsEmbed — TMDB ID
      return isTV
        ? `https://letsembed.cc/embed/tv/?id=${id}/${season}/${episode}`
        : `https://letsembed.cc/embed/movie/?id=${id}`;

    case 4: // VidSrc — TMDB ID
      return isTV
        ? `https://vidsrc.to/embed/tv/${id}/${season}/${episode}`
        : `https://vidsrc.to/embed/movie/${id}`;

    case 5: // SuperEmbed / multiembed — TMDB ID
      return isTV
        ? `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1&s=${season}&e=${episode}`
        : `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1`;

    case 6: // 2Embed — TMDB ID
      return isTV
        ? `https://www.2embed.cc/embedtv/${id}&s=${season}&e=${episode}`
        : `https://www.2embed.cc/embed/${id}`;

    default: return null;
  }
}

// ── LOAD SERVER ───────────────────────────
function loadServer(server) {
  const url = buildStreamURL(server);

  if (!url) {
    // IMDb ID missing for S1/S2 — auto-skip to S3
    console.warn(`Server ${server} requires IMDb ID — skipping to S3`);
    setServerStatus('⚠ IMDb ID missing, using S3');
    // Update button highlight to S3
    document.querySelectorAll('.server-btn').forEach((b, i) => {
      b.classList.toggle('active', i === 2); // index 2 = S3
    });
    currentServer = 3;
    loadServer(3);
    return;
  }

  currentServer = server;
  setServerStatus('Loading...');

  const iframe = document.getElementById('player-iframe');
  iframe.src = url;

  // Clear previous timer
  if (window._playerTimer) clearTimeout(window._playerTimer);

  iframe.onload = () => {
    document.getElementById('player-loading').classList.add('hidden');
    setServerStatus('');
  };

  // Safety timeout — hide loader after 6s regardless
  window._playerTimer = setTimeout(() => {
    document.getElementById('player-loading').classList.add('hidden');
    setServerStatus('');
  }, 6000);
}

// ── SWITCH SERVER (button click) ──────────
function switchServer(serverNum, el) {
  document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('player-loading').classList.remove('hidden');
  loadServer(serverNum);
}

// ── TRY NEXT SERVER ───────────────────────
// Cycles S1→S2→S3→S4→S5→S6→S1 automatically
function tryNextServer() {
  const next = (currentServer % 6) + 1; // 1→2→3→4→5→6→1
  const btns = document.querySelectorAll('.server-btn');
  btns.forEach((b, i) => b.classList.toggle('active', i === next - 1));
  document.getElementById('player-loading').classList.remove('hidden');
  showToast(`Trying Server ${next}...`);
  loadServer(next);
}

// ── SERVER STATUS LABEL ───────────────────
function setServerStatus(msg) {
  const el = document.getElementById('server-status');
  if (el) el.textContent = msg;
}

// ── TV SEASON/EPISODE LOGIC ───────────────
async function loadTVControls(details) {
  const tvDiv = document.getElementById('tv-controls');
  tvDiv.style.display = 'block';

  const seasons = (details.seasons || []).filter(s => s.season_number > 0);
  const seasonSel = document.getElementById('season-select');
  seasonSel.innerHTML = seasons.map(s =>
    `<option value="${s.season_number}">Season ${s.season_number}</option>`
  ).join('');

  currentMedia.season = seasons[0]?.season_number || 1;
  await loadEpisodes(currentMedia.id, currentMedia.season);
}

// Called when season dropdown changes
async function onSeasonChange() {
  const s = parseInt(document.getElementById('season-select').value);
  currentMedia.season = s;
  currentMedia.episode = 1;          // reset to ep 1 on season change
  await loadEpisodes(currentMedia.id, s);
  // Only LetsEmbed (server 3) supports season/episode routing;
  // for servers 1 & 2 the stream auto-handles it via IMDb ID
  if (currentServer >= 3) loadServer(currentServer); // Reload TMDB-based servers (3-6) on episode change
}

// Called when episode dropdown changes
async function onEpisodeDropChange() {
  const e = parseInt(document.getElementById('episode-select-drop').value);
  currentMedia.episode = e;
  // Sync grid highlight
  document.querySelectorAll('.episode-card').forEach((c, i) => {
    c.classList.toggle('active', i + 1 === e);
  });
  if (currentServer >= 3) loadServer(currentServer); // Reload TMDB-based servers (3-6) on episode change
}

async function loadEpisodes(tmdbId, season) {
  try {
    const data = await tmdb(`/tv/${tmdbId}/season/${season}`);
    const episodes = data.episodes || [];

    // Populate dropdown
    const drop = document.getElementById('episode-select-drop');
    drop.innerHTML = episodes.map(ep =>
      `<option value="${ep.episode_number}">Ep ${ep.episode_number}: ${ep.name}</option>`
    ).join('');

    // Render episode grid
    const grid = document.getElementById('episode-grid');
    grid.innerHTML = episodes.map(ep => {
      const thumb = ep.still_path ? imgUrl(ep.still_path, 'w185') : PLACEHOLDER;
      return `
        <div class="episode-card ${ep.episode_number===1?'active':''}"
             onclick="selectEpisode(${ep.episode_number},this)">
          <div class="episode-thumb">
            <img src="${PLACEHOLDER}" data-src="${thumb}" alt="Ep ${ep.episode_number}" loading="lazy">
          </div>
          <div>
            <div class="episode-num">Episode ${ep.episode_number}</div>
            <div class="episode-name">${ep.name||''}</div>
            <div class="episode-overview">${ep.overview||''}</div>
          </div>
        </div>`;
    }).join('');

    // Lazy load episode thumbnails
    grid.querySelectorAll('img[data-src]').forEach(observeCardImage);
  } catch(e) {
    console.error('Episodes load error', e);
  }
}

// Called when user clicks an episode card in the grid
function selectEpisode(epNum, el) {
  currentMedia.episode = epNum;
  document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('episode-select-drop').value = epNum;
  document.getElementById('player-loading').classList.remove('hidden');
  loadServer(currentServer); // reload whichever server is currently active
}

// ── TRAILER ───────────────────────────────
async function openTrailer(tmdbId, type) {
  try {
    const data = await tmdb(`/${type}/${tmdbId}/videos`);
    const trailer = data.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube')
      || data.results?.[0];
    if (trailer) {
      document.getElementById('trailer-iframe').src =
        `https://www.youtube.com/embed/${trailer.key}?autoplay=1&rel=0`;
      document.getElementById('trailer-modal').classList.add('open');
    } else {
      showToast('No trailer available for this title');
    }
  } catch(e) { showToast('Could not load trailer'); }
}
function closeTrailer() {
  document.getElementById('trailer-modal').classList.remove('open');
  document.getElementById('trailer-iframe').src = '';
}
function closeTrailerOnBg(e) {
  if (e.target === document.getElementById('trailer-modal')) closeTrailer();
}

// ── SEARCH ────────────────────────────────
/*
  Uses TMDB multi-search: /search/multi
  Or filtered: /search/movie  /search/tv
  Supports infinite scroll pagination
*/
let searchDebounce = null;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    searchQuery = e.target.value.trim();
    if (searchQuery.length > 1) {
      resetSearch();
      doSearch();
    } else {
      showSearchEmpty();
    }
  }, 350);
});

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  showSearchEmpty();
}

function setSearchFilter(filter, el) {
  searchFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (searchQuery) { resetSearch(); doSearch(); }
}

function resetSearch() {
  searchPage = 1; searchTotal = 0; searchLoading = false;
  document.getElementById('search-grid').innerHTML = '';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-empty').style.display = 'none';
  document.getElementById('search-loading').style.display = 'flex';
}

function showSearchEmpty() {
  document.getElementById('search-grid').innerHTML = '';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-loading').style.display = 'none';
  document.getElementById('search-empty').style.display = 'flex';
}

async function doSearch() {
  if (searchLoading) return;
  searchLoading = true;
  document.getElementById('search-load-more').style.display = searchPage>1 ? 'flex' : 'none';

  try {
    let endpoint, params;
    if (searchFilter === 'movie') {
      endpoint = '/search/movie';
      params = `&query=${encodeURIComponent(searchQuery)}&page=${searchPage}`;
    } else if (searchFilter === 'tv') {
      endpoint = '/search/tv';
      params = `&query=${encodeURIComponent(searchQuery)}&page=${searchPage}`;
    } else {
      endpoint = '/search/multi';
      params = `&query=${encodeURIComponent(searchQuery)}&page=${searchPage}`;
    }

    const data = await tmdb(endpoint, params);
    const items = (data.results||[]).filter(i => i.media_type !== 'person');
    searchTotal = data.total_results || 0;

    document.getElementById('search-loading').style.display = 'none';
    document.getElementById('search-load-more').style.display = 'none';

    if (items.length === 0 && searchPage === 1) {
      showSearchEmpty();
      document.getElementById('search-empty').querySelector('p').textContent = `No results for "${searchQuery}"`;
      return;
    }

    document.getElementById('search-results').style.display = 'block';
    document.getElementById('results-count').textContent = searchTotal.toLocaleString();

    const grid = document.getElementById('search-grid');
    items.forEach(item => {
      const type = item.media_type || (item.title ? 'movie' : 'tv');
      if (!item.poster_path && !item.backdrop_path) return;
      grid.appendChild(createCard(item, type === 'person' ? null : type));
    });

    searchPage++;
    searchLoading = false;

    if (searchPage <= (data.total_pages||1)) {
      setupSearchObserver();
    }
  } catch(e) {
    console.error('Search error', e);
    searchLoading = false;
    showToast('Search failed, please try again');
  }
}

// Infinite scroll for search results using IntersectionObserver
function setupSearchObserver() {
  if (searchObserver) searchObserver.disconnect();
  const sentinel = document.getElementById('search-sentinel');
  searchObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !searchLoading) {
      doSearch();
    }
  }, { rootMargin: '200px' });
  searchObserver.observe(sentinel);
}

// ── NAVBAR SCROLL EFFECT ──────────────────
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  nav.classList.toggle('scrolled', window.scrollY > 20);
});

// ── INIT ──────────────────────────────────
async function init() {
  const finishLoading = animateLoadingBar();

  try {
    renderGenrePills();
    renderGenreDropdown();

    // Load hero and sections in parallel
    await Promise.all([
      loadHero(),
      (async () => {
        loadAllSections();
      })()
    ]);
  } catch(e) {
    console.error('Init error', e);
  }

  finishLoading(() => {
    document.getElementById('loading-screen').classList.add('hidden');
  });
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('trailer-modal').classList.contains('open')) closeTrailer();
    else if (currentPage === 'player') goBack();
    else if (currentPage === 'search') showPage('home');
  }
  if (e.key === '/' && currentPage !== 'search') {
    e.preventDefault();
    showPage('search');
  }
});

// Start
init();
</script>
